name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate config.js from template
        env:
          DD_APP_ID: ${{ secrets.DD_APP_ID }}
          DD_CLIENT_TOKEN: ${{ secrets.DD_CLIENT_TOKEN }}
        run: |
          sed \
            -e "s/%%DD_APP_ID%%/${DD_APP_ID}/" \
            -e "s/%%DD_CLIENT_TOKEN%%/${DD_CLIENT_TOKEN}/" \
            -e "s/%%VERSION%%/${GITHUB_SHA:0:7}/" \
            config.template.js > config.js

      - name: Inject GitHub URLs
        run: |
          PAGES_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          GITHUB_REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          sed -i \
            -e "s|%%PAGES_URL%%|${PAGES_URL}|g" \
            -e "s|%%GITHUB_REPO%%|${GITHUB_REPO_URL}|g" \
            index.html README.md

      - name: Validate config.js
        run: |
          # Fast check: no unreplaced placeholders
          if grep -q '%%' config.js; then
            echo "ERROR: Unreplaced placeholders remain in config.js — check that DD_APP_ID and DD_CLIENT_TOKEN secrets are set"
            grep '%%' config.js
            exit 1
          fi

          # Full validation: required fields are present and non-empty
          node - << 'EOF'
          const fs = require('fs');

          // Mock browser globals — simulate a GitHub Pages hostname
          const owner = process.env.GITHUB_REPOSITORY_OWNER;
          global.window = { location: { hostname: `${owner}.github.io` } };

          eval(fs.readFileSync('config.js', 'utf8'));

          const cfg = window.DD_CONFIG;
          const required = ['applicationId', 'clientToken', 'site', 'service', 'version'];
          const missing = required.filter(k => !cfg[k]);

          if (missing.length) {
            console.error('ERROR: Missing or empty fields in DD_CONFIG:', missing.join(', '));
            process.exit(1);
          }

          console.log('config.js validation passed');
          console.log('  service:', cfg.service);
          console.log('  version:', cfg.version);
          console.log('  env:    ', cfg.env);
          EOF

      - name: Generate source maps
        run: |
          # Produce identity source maps (no minification) so Datadog can link
          # stack frames to exact GitHub file + line references.
          npx --yes terser app.js \
            --source-map "filename='app.js.map',url='app.js.map',root=''" \
            --output app.js \
            --no-compress \
            --no-mangle
          # Verify the source map file field is correct before uploading.
          node -e "const m=require('./app.js.map'); console.log('source map file field:', m.file);"

      - name: Upload source maps to Datadog
        env:
          DATADOG_API_KEY: ${{ secrets.DD_API_KEY }}
          DATADOG_SITE: datadoghq.com
        run: |
          PAGES_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          npx --yes @datadog/datadog-ci sourcemaps upload . \
            --service datadog-rum-pizza-builder \
            --release-version ${GITHUB_SHA:0:7} \
            --minified-path-prefix ${PAGES_URL}/ \
            --repository-url https://github.com/${GITHUB_REPOSITORY}

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
